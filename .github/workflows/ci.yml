name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-serving.txt
            requirements-pipeline.txt
            requirements-monitoring.txt

      - name: Install ruff (linter)
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check src/

      - name: Install serving dependencies
        run: pip install -r requirements-serving.txt

      - name: Verify serving app imports cleanly
        run: |
          python -c "from src.serving.app import app; print('serving ok')"

      - name: Install pipeline dependencies
        run: pip install -r requirements-pipeline.txt

      - name: Verify pipeline imports cleanly
        run: |
          python -c "from src.pipeline.producer import make_kafka_config, on_delivery; print('producer ok')"
          python -c "from src.pipeline.consumer import make_cache_key, make_kafka_config; print('consumer ok')"

      - name: Install monitoring dependencies
        run: pip install -r requirements-monitoring.txt

      - name: Verify monitoring imports cleanly
        run: |
          python -c "from src.monitoring.drift import build_reference_df, load_current_df; print('drift ok')"

      - name: Smoke-test reference dataset builds correctly
        run: |
          python -c "
          from src.monitoring.drift import build_reference_df
          df = build_reference_df()
          assert len(df) == 7600, f'expected 7600 rows, got {len(df)}'
          assert set(df['label'].unique()) == {'World', 'Sports', 'Business', 'Sci/Tech'}
          dist = df['label'].value_counts()
          assert all(dist == 1900), 'expected 1900 rows per label'
          print(f'reference df: {len(df)} rows, distribution ok')
          "
